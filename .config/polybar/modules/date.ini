[module/date]
type = custom/script
exec = ~/.config/polybar/scripts/date.sh
interval = 1

label = %output%
label-foreground = ${colors.foreground}
click-left = kitty --class clock -o remember_window_size=no -e tty-clock -c -C 4 -s -b
click-right = kitty --class sysinfo -o remember_window_size=no -e $HOME/.config/polybar/scripts/sysinfo.sh
